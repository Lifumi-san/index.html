<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifumi Studio — Draw & Animate</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e12;--surface:#16161c;--surface2:#1e1e26;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f0f5;--text2:#888899;--accent:#c084fc;--accent2:#38bdf8;--accent3:#f472b6;--red:#ff4466;--radius:8px;--radius-lg:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
#logo{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-.02em;}
#logo span{color:var(--accent2);}
#save-indicator{font-size:11px;color:var(--text2);}
#app{display:flex;flex-direction:column;gap:4px;padding:8px;}
.bar{display:flex;flex-wrap:wrap;gap:3px;align-items:center;padding:5px 8px;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);}
.tb{padding:3px 8px;font-size:11px;border:1px solid var(--border2);background:transparent;border-radius:6px;cursor:pointer;color:var(--text2);white-space:nowrap;line-height:1.4;font-family:'DM Sans',sans-serif;transition:all .12s;}
.tb:hover{background:var(--surface2);color:var(--text);}
.tb.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.sep{width:1px;height:16px;background:var(--border);flex-shrink:0;}
.lbl{font-size:10px;color:var(--text2);white-space:nowrap;}
input[type=range]{width:52px;accent-color:var(--accent);}
input[type=color]{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;padding:0;background:none;}
select{background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:6px;font-size:11px;padding:2px 5px;font-family:'DM Sans',sans-serif;}
.brush-cat{font-size:10px;color:var(--accent);font-weight:600;padding:2px 5px;background:rgba(192,132,252,0.1);border-radius:4px;white-space:nowrap;border:1px solid rgba(192,132,252,0.2);}
#canvas-outer{position:relative;overflow:hidden;border-radius:var(--radius-lg);border:1px solid var(--border2);background:#555;align-self:flex-start;}
#onion-canvas,#sel-canvas,#main-canvas{position:absolute;top:0;left:0;}
#main-canvas{touch-action:none;}
#sel-canvas{pointer-events:none;}
#timeline{display:flex;gap:5px;overflow-x:auto;padding:4px 0;min-height:62px;align-items:center;}
#timeline::-webkit-scrollbar{height:4px;}
#timeline::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.fthumb-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;cursor:pointer;padding:2px;border-radius:6px;}
.fthumb-wrap:hover{background:var(--surface2);}
.fthumb{width:54px;height:40px;border-radius:4px;border:2px solid var(--border2);object-fit:cover;display:block;}
.fthumb-wrap.cur .fthumb{border-color:var(--accent);}
.fnum{font-size:9px;color:var(--text2);font-family:'Space Mono',monospace;}
.fthumb-wrap.cur .fnum{color:var(--accent);}
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;flex-shrink:0;border:2px solid transparent;transition:transform .1s;}
.cdot:hover,.cdot.active{transform:scale(1.3);border-color:var(--accent);}
#cur-color-box{width:18px;height:18px;border-radius:4px;border:1px solid var(--border2);margin-left:2px;}
#zoom-disp{font-size:11px;min-width:36px;text-align:center;color:var(--text);font-family:'Space Mono',monospace;}
#status{font-size:10px;color:var(--text2);font-family:'Space Mono',monospace;}
#gif-progress{font-size:11px;color:var(--accent2);display:none;}
#audio-panel{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:6px;}
#audio-tabs{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.audio-tab-content{display:none;}
.audio-tab-content.open{display:flex;flex-direction:column;gap:6px;}
#beat-grid{display:flex;flex-direction:column;gap:3px;}
.beat-row{display:flex;gap:3px;align-items:center;}
.beat-label{font-size:10px;color:var(--text2);width:52px;flex-shrink:0;font-family:'Space Mono',monospace;}
.beat-cell{width:22px;height:22px;border-radius:3px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;transition:background .08s;}
.beat-cell.on{background:var(--accent);}
.beat-cell.playing{outline:2px solid var(--accent2);outline-offset:1px;}
#sfx-grid{display:flex;flex-wrap:wrap;gap:4px;}
.sfx-btn{padding:5px 10px;font-size:11px;border:1px solid var(--border2);background:var(--surface2);border-radius:6px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;transition:all .1s;}
.sfx-btn:hover{border-color:var(--accent);color:var(--accent);}
#waveform,#rec-waveform{width:100%;height:36px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);}
#audio-status,#rec-status,#uploaded-track{font-size:11px;color:var(--text2);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>
<div id="header">
  <div id="logo">lifumi<span>studio</span></div>
  <span id="save-indicator">ready</span>
</div>
<div id="app">
<div class="bar">
  <span class="lbl">Draw</span>
  <button class="tb active" id="btn-pen">Pen</button>
  <button class="tb" id="btn-brush">Soft</button>
  <button class="tb" id="btn-smudge">Smudge</button>
  <button class="tb" id="btn-eraser">Eraser</button>
  <button class="tb" id="btn-fill">Fill</button>
  <button class="tb" id="btn-grad">Gradient</button>
  <button class="tb" id="btn-line">Line</button>
  <button class="tb" id="btn-rect">Rect</button>
  <button class="tb" id="btn-rectfill">RectFill</button>
  <button class="tb" id="btn-circle">Circle</button>
  <button class="tb" id="btn-circlefill">CircleFill</button>
  <button class="tb" id="btn-text">Text</button>
  <button class="tb" id="btn-select">Select</button>
  <button class="tb" id="btn-eyedrop">Eyedrop</button>
  <button class="tb" id="btn-move">Move</button>
  <div class="sep"></div>
  <span class="lbl">Size</span>
  <input type="range" id="sz" min="1" max="80" value="6" step="1">
  <span id="sz-v" style="font-size:11px;min-width:20px;font-family:'Space Mono',monospace;">6</span>
  <div class="sep"></div>
  <span class="lbl">Opacity</span>
  <input type="range" id="op" min="5" max="100" value="100" step="5">
  <span id="op-v" style="font-size:11px;min-width:28px;font-family:'Space Mono',monospace;">100%</span>
</div>
<div class="bar">
  <span class="lbl">Colors</span>
  <div id="palette" style="display:flex;gap:3px;flex-wrap:wrap;max-width:240px;"></div>
  <input type="color" id="custom-color" value="#cc3377">
  <div id="cur-color-box"></div>
  <div class="sep"></div>
  <span class="lbl">BG</span>
  <button class="tb" id="bg-white">White</button>
  <button class="tb" id="bg-black">Black</button>
  <button class="tb" id="bg-navy">Navy</button>
  <button class="tb" id="bg-skin">Skin</button>
  <div class="sep"></div>
  <span class="lbl">Zoom</span>
  <button class="tb" id="btn-zoom-out">-</button>
  <span id="zoom-disp">100%</span>
  <button class="tb" id="btn-zoom-in">+</button>
  <button class="tb" id="btn-zoom-fit">Fit</button>
  <div class="sep"></div>
  <button class="tb" id="btn-undo">Undo</button>
  <button class="tb" id="btn-redo">Redo</button>
  <button class="tb" id="btn-clear">Clear</button>
  <button class="tb" id="btn-import">Import img</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <div class="sep"></div>
  <button class="tb" id="btn-flip-h">Flip H</button>
  <button class="tb" id="btn-flip-v">Flip V</button>
  <button class="tb" id="btn-rot-l">Rot L</button>
  <button class="tb" id="btn-rot-r">Rot R</button>
  <button class="tb" id="btn-crop">Crop</button>
</div>
<div class="bar">
  <span class="brush-cat">Art</span>
  <button class="tb active" id="br-normal">Normal</button>
  <button class="tb" id="br-pencil">Pencil</button>
  <button class="tb" id="br-marker">Marker</button>
  <button class="tb" id="br-watercolor">Watercolor</button>
  <button class="tb" id="br-oil">Oil</button>
  <button class="tb" id="br-ink">Ink</button>
  <button class="tb" id="br-chalk">Chalk</button>
  <button class="tb" id="br-pixel">Pixel</button>
  <div class="sep"></div>
  <span class="brush-cat">Hair</span>
  <button class="tb" id="br-hair-fine">1A Fine</button>
  <button class="tb" id="br-hair-wavy">2B Wavy</button>
  <button class="tb" id="br-hair-curly">3C Curly</button>
  <button class="tb" id="br-hair-coily">4C Coily</button>
  <button class="tb" id="br-hair-thick">Thick</button>
  <button class="tb" id="br-lash">Lashes</button>
  <button class="tb" id="br-eye">Eye shine</button>
  <button class="tb" id="br-fur">Fur</button>
  <button class="tb" id="br-feather">Feather</button>
  <div class="sep"></div>
  <span class="brush-cat">Nature</span>
  <button class="tb" id="br-fire">Fire</button>
  <button class="tb" id="br-snow">Snow</button>
  <button class="tb" id="br-bubble">Bubbles</button>
  <button class="tb" id="br-leaf">Leaves</button>
  <button class="tb" id="br-star">Stars</button>
  <button class="tb" id="br-grass">Grass</button>
  <button class="tb" id="br-cloud">Fluffy</button>
  <div class="sep"></div>
  <span class="brush-cat">Texture</span>
  <button class="tb" id="br-scale">Scales</button>
  <button class="tb" id="br-crosshatch">Crosshatch</button>
  <button class="tb" id="br-stipple">Stipple</button>
  <button class="tb" id="br-glitter">Glitter</button>
  <button class="tb" id="br-web">Web</button>
  <button class="tb" id="br-scatter">Scatter</button>
  <div class="sep"></div>
  <span class="brush-cat">FX</span>
  <button class="tb" id="br-crystal">Crystal</button>
  <button class="tb" id="br-neon-line">Neon</button>
  <button class="tb" id="br-confetti">Confetti</button>
  <button class="tb" id="br-splat">Splat</button>
</div>
<div class="bar">
  <span class="lbl">Effect</span>
  <button class="tb active" id="ef-none">None</button>
  <button class="tb" id="ef-neon">Neon</button>
  <button class="tb" id="ef-rainbow">Rainbow</button>
  <button class="tb" id="ef-sparkle">Sparkle</button>
  <button class="tb" id="ef-pastel">Pastel</button>
  <button class="tb" id="ef-bw">B&amp;W</button>
  <div class="sep"></div>
  <span class="lbl">Symmetry</span>
  <button class="tb active" id="sym-none">Off</button>
  <button class="tb" id="sym-h">H</button>
  <button class="tb" id="sym-v">V</button>
  <button class="tb" id="sym-4">4-way</button>
  <button class="tb" id="sym-8">8-way</button>
  <button class="tb" id="sym-rad">Radial</button>
  <div class="sep"></div>
  <span class="lbl">Filter</span>
  <button class="tb" id="filt-blur">Blur</button>
  <button class="tb" id="filt-sharp">Sharpen</button>
  <button class="tb" id="filt-bright">Brighten</button>
  <button class="tb" id="filt-dark">Darken</button>
  <button class="tb" id="filt-sat">Saturate</button>
  <button class="tb" id="filt-desat">Desaturate</button>
  <div class="sep"></div>
  <span class="lbl">Onion</span>
  <button class="tb" id="onion-toggle">Off</button>
  <input type="range" id="onion-op" min="5" max="70" value="25" step="5">
  <span class="lbl">Back</span>
  <input type="range" id="onion-back" min="1" max="4" value="1" step="1" style="width:38px">
  <span id="onion-back-v" style="font-size:10px;min-width:12px;color:var(--text2);">1</span>
</div>
<div id="canvas-outer">
  <canvas id="onion-canvas"></canvas>
  <canvas id="main-canvas" style="cursor:crosshair;"></canvas>
  <canvas id="sel-canvas"></canvas>
</div>
<div class="bar">
  <span class="lbl">Frames</span>
  <button class="tb" id="btn-add-frame">+ Add</button>
  <button class="tb" id="btn-dup-frame">Dup</button>
  <button class="tb" id="btn-del-frame">Del</button>
  <button class="tb" id="btn-move-left">&#9664;</button>
  <button class="tb" id="btn-move-right">&#9654;</button>
  <div class="sep"></div>
  <span class="lbl">FPS</span>
  <input type="range" id="fps-sl" min="1" max="24" value="8" step="1" style="width:48px">
  <span id="fps-v" style="font-size:11px;min-width:18px;font-family:'Space Mono',monospace;">8</span>
  <span class="lbl">Loop</span>
  <select id="loop-sel"><option value="0">Forever</option><option value="1">Once</option><option value="2">2x</option><option value="3">3x</option></select>
  <button class="tb" id="btn-play">&#9654; Play</button>
  <button class="tb" id="btn-stop" style="display:none">&#9632; Stop</button>
  <div class="sep"></div>
  <button class="tb" id="btn-export-gif" style="border-color:var(--accent2);color:var(--accent2);">Export GIF</button>
  <span id="gif-progress"></span>
  <div class="sep"></div>
  <span id="status"></span>
</div>
<div id="timeline"></div>
<div id="audio-panel">
  <div id="audio-tabs">
    <span class="lbl">Audio:</span>
    <button class="tb active" id="tab-sfx" onclick="openTab('sfx')">Sound FX</button>
    <button class="tb" id="tab-beat" onclick="openTab('beat')">Beat maker</button>
    <button class="tb" id="tab-upload" onclick="openTab('upload')">Upload audio</button>
    <button class="tb" id="tab-rec" onclick="openTab('rec')">Record mic</button>
    <div class="sep"></div>
    <span class="lbl">Vol</span>
    <input type="range" id="master-vol" min="0" max="100" value="80" step="1" style="width:60px">
  </div>
  <div id="tab-sfx-content" class="audio-tab-content open"><div id="sfx-grid"></div></div>
  <div id="tab-beat-content" class="audio-tab-content">
    <div class="bar" style="gap:5px;">
      <button class="tb" id="beat-play">&#9654; Play</button>
      <button class="tb" id="beat-stop">&#9632; Stop</button>
      <button class="tb" id="beat-clear">Clear</button>
      <div class="sep"></div>
      <span class="lbl">BPM</span>
      <input type="range" id="bpm-sl" min="60" max="200" value="120" step="1" style="width:65px">
      <span id="bpm-v" style="font-size:11px;min-width:28px;font-family:'Space Mono',monospace;">120</span>
      <div class="sep"></div>
      <button class="tb" id="steps-8">8</button>
      <button class="tb active" id="steps-16">16</button>
      <button class="tb" id="steps-32">32</button>
    </div>
    <div id="beat-grid"></div>
  </div>
  <div id="tab-upload-content" class="audio-tab-content">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <button class="tb" id="btn-upload-audio">Choose MP3 / WAV</button>
      <input type="file" id="audio-file-input" accept="audio/*" style="display:none">
      <span id="uploaded-track">No file loaded</span>
      <button class="tb" id="btn-play-upload" style="display:none">Play</button>
      <button class="tb" id="btn-stop-upload" style="display:none">Stop</button>
      <button class="tb" id="btn-loop-upload" style="display:none">Loop: Off</button>
      <span class="lbl">Vol</span>
      <input type="range" id="upload-vol" min="0" max="100" value="80" step="1" style="width:60px;display:none">
    </div>
    <canvas id="waveform" width="800" height="36"></canvas>
    <span id="audio-status"></span>
  </div>
  <div id="tab-rec-content" class="audio-tab-content">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <button class="tb" id="btn-rec-start" style="border-color:var(--red);color:var(--red);">&#9210; Record</button>
      <button class="tb" id="btn-rec-stop" style="display:none">&#9632; Stop</button>
      <button class="tb" id="btn-rec-play" style="display:none">&#9654; Play</button>
      <button class="tb" id="btn-rec-loop" style="display:none">Loop: Off</button>
      <button class="tb" id="btn-rec-clear" style="display:none">Clear</button>
      <span class="lbl">Vol</span>
      <input type="range" id="rec-vol" min="0" max="100" value="80" step="1" style="width:60px;">
      <span id="rec-status">Click Record to start</span>
    </div>
    <canvas id="rec-waveform" width="800" height="36"></canvas>
  </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
const CW=800,CH=500;
const COLORS=['#000000','#1a1a2e','#333','#555','#888','#bbb','#ffffff','#f5d5c0','#e8a87c','#c97b4b','#8b4513','#ff3366','#ff7700','#ffcc00','#99cc00','#00cc66','#00aaff','#3355ff','#7733ff','#ff44cc','#ff99aa','#00eeff','#ffccaa'];
const mainCanvas=document.getElementById('main-canvas');
const onionCanvas=document.getElementById('onion-canvas');
const selCanvas=document.getElementById('sel-canvas');
const ctx=mainCanvas.getContext('2d');
const octx=onionCanvas.getContext('2d');
const sctx=selCanvas.getContext('2d');
const outer=document.getElementById('canvas-outer');
[mainCanvas,onionCanvas,selCanvas].forEach(c=>{c.width=CW;c.height=CH;});
let zoom=1;
function setZoom(z){zoom=Math.max(.25,Math.min(4,z));const w=Math.round(CW*zoom),h=Math.round(CH*zoom);[mainCanvas,onionCanvas,selCanvas].forEach(c=>{c.style.width=w+'px';c.style.height=h+'px';});outer.style.width=w+'px';outer.style.height=h+'px';document.getElementById('zoom-disp').textContent=Math.round(zoom*100)+'%';}
setZoom(1);
let tool='pen',specialBrush='normal',effect='none',symmetry='none';
let currentColor='#ffffff',bgColor='#0e0e12';
let drawing=false,lastX=0,lastY=0,startX=0,startY=0;
let undoStack=[],redoStack=[];
let frames=[],currentFrame=0;
let animInterval=null;
let rainbowHue=0,sparkles=[];
let snapshotBefore=null,onionOn=false,strokeCount=0;
let moveSnapshot=null,moveStartX=0,moveStartY=0;
let selActive=false,selX=0,selY=0,selW=0,selH=0,selDash=0;
let gradStart=null,webLastX=null,webLastY=null;
document.getElementById('cur-color-box').style.background=currentColor;
const palette=document.getElementById('palette');
COLORS.forEach(c=>{const d=document.createElement('div');d.className='cdot';d.style.background=c;if(c==='#ffffff')d.style.boxShadow='inset 0 0 0 1px #555';d.onclick=()=>setColor(c);palette.appendChild(d);});
document.getElementById('custom-color').oninput=function(){setColor(this.value);};
function setColor(c){currentColor=c;document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));document.getElementById('cur-color-box').style.background=c;}
document.getElementById('sz').oninput=function(){document.getElementById('sz-v').textContent=this.value;};
document.getElementById('op').oninput=function(){document.getElementById('op-v').textContent=this.value+'%';};
document.getElementById('fps-sl').oninput=function(){document.getElementById('fps-v').textContent=this.value;};
document.getElementById('onion-back').oninput=function(){document.getElementById('onion-back-v').textContent=this.value;if(onionOn)renderOnion();};
function getSize(){return +document.getElementById('sz').value;}
function getOpacity(){return +document.getElementById('op').value/100;}
['pen','brush','smudge','eraser','fill','grad','line','rect','rectfill','circle','circlefill','text','select','eyedrop','move'].forEach(t=>{const b=document.getElementById('btn-'+t);if(b)b.onclick=()=>{tool=t;document.querySelectorAll('.bar:nth-child(2) .tb').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(t!=='select')clearSel();};});
['normal','pencil','marker','watercolor','oil','ink','chalk','pixel','hair-fine','hair-wavy','hair-curly','hair-coily','hair-thick','lash','eye','fur','feather','fire','snow','bubble','leaf','star','grass','cloud','scale','crosshatch','stipple','glitter','web','scatter','crystal','neon-line','confetti','splat'].forEach(k=>{const b=document.getElementById('br-'+k);if(b)b.onclick=()=>{specialBrush=k;document.querySelectorAll('.bar:nth-child(4) .tb').forEach(x=>{if(x.id&&x.id.startsWith('br-'))x.classList.remove('active');});b.classList.add('active');webLastX=null;webLastY=null;};});
['none','neon','rainbow','sparkle','pastel','bw'].forEach(e=>{const b=document.getElementById('ef-'+e);if(b)b.onclick=()=>{effect=e;['none','neon','rainbow','sparkle','pastel','bw'].forEach(x=>{const bb=document.getElementById('ef-'+x);if(bb)bb.classList.remove('active');});b.classList.add('active');};});
['none','h','v','4','8','rad'].forEach(s=>{const b=document.getElementById('sym-'+s);if(b)b.onclick=()=>{symmetry=s;['none','h','v','4','8','rad'].forEach(x=>{const bb=document.getElementById('sym-'+x);if(bb)bb.classList.remove('active');});b.classList.add('active');};});
document.getElementById('onion-toggle').onclick=function(){onionOn=!onionOn;this.textContent=onionOn?'On':'Off';this.classList.toggle('active',onionOn);if(!onionOn)octx.clearRect(0,0,CW,CH);else renderOnion();};
document.getElementById('onion-op').oninput=renderOnion;
document.getElementById('btn-zoom-in').onclick=()=>setZoom(zoom*1.25);

document.getElementById('file-input').onchange=function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{pushUndo();ctx.drawImage(img,0,0,CW,CH);saveFrame();updateTimeline();};img.src=e.target.result;};r.readAsDataURL(f);this.value='';};
({'bg-white':'#ffffff','bg-black':'#000000','bg-navy':'#0d1b3e','bg-skin':'#f5d5c0'});

function fillBackground(){ctx.save();ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';ctx.fillStyle=bgColor||'#0e0e12';ctx.fillRect(0,0,CW,CH);ctx.restore();}
['blur','sharp','bright','dark','sat','desat'].forEach(f=>{const b=document.getElementById('filt-'+f);if(b)b.onclick=()=>applyFilter(f);});
function applyFilter(type){pushUndo();const id=ctx.getImageData(0,0,CW,CH);const d=id.data;if(type==='blur'){const tmp=new Uint8ClampedArray(d);for(let y=1;y<CH-1;y++)for(let x=1;x<CW-1;x++){const i=(y*CW+x)*4;for(let c=0;c<3;c++)d[i+c]=Math.round((tmp[i+c]+tmp[i-4+c]+tmp[i+4+c]+tmp[(y-1)*CW*4+x*4+c]+tmp[(y+1)*CW*4+x*4+c])/5);}}else if(type==='sharp'){const o=new Uint8ClampedArray(d);for(let y=1;y<CH-1;y++)for(let x=1;x<CW-1;x++){const i=(y*CW+x)*4;for(let c=0;c<3;c++)d[i+c]=Math.max(0,Math.min(255,5*o[i+c]-o[i-4+c]-o[i+4+c]-o[(y-1)*CW*4+x*4+c]-o[(y+1)*CW*4+x*4+c]));}}else if(type==='bright'){for(let i=0;i<d.length;i+=4){d[i]=Math.min(255,d[i]+25);d[i+1]=Math.min(255,d[i+1]+25);d[i+2]=Math.min(255,d[i+2]+25);}}else if(type==='dark'){for(let i=0;i<d.length;i+=4){d[i]=Math.max(0,d[i]-25);d[i+1]=Math.max(0,d[i+1]-25);d[i+2]=Math.max(0,d[i+2]-25);}}else if(type==='sat'){for(let i=0;i<d.length;i+=4){const avg=(d[i]+d[i+1]+d[i+2])/3;d[i]=Math.min(255,avg+(d[i]-avg)*1.5);d[i+1]=Math.min(255,avg+(d[i+1]-avg)*1.5);d[i+2]=Math.min(255,avg+(d[i+2]-avg)*1.5);}}else if(type==='desat'){for(let i=0;i<d.length;i+=4){const g=d[i]*.3+d[i+1]*.59+d[i+2]*.11;d[i]=d[i+1]=d[i+2]=g;}}ctx.putImageData(id,0,0);saveFrame();updateTimeline();}

function tCanvas(type){pushUndo();const t=document.createElement('canvas');t.width=CW;t.height=CH;const tc=t.getContext('2d');if(type==='fliph'){tc.translate(CW,0);tc.scale(-1,1);}else if(type==='flipv'){tc.translate(0,CH);tc.scale(1,-1);}else if(type==='rotl'){tc.translate(0,CH);tc.rotate(-Math.PI/2);}else if(type==='rotr'){tc.translate(CW,0);tc.rotate(Math.PI/2);}tc.drawImage(mainCanvas,0,0);ctx.clearRect(0,0,CW,CH);ctx.drawImage(t,0,0,CW,CH);saveFrame();updateTimeline();}
document.getElementById('btn-crop').onclick=()=>{if(!selActive||selW===0||selH===0)return;pushUndo();const sx=Math.min(selX,selX+selW),sy=Math.min(selY,selY+selH),sw=Math.abs(selW),sh=Math.abs(selH);const id=ctx.getImageData(sx,sy,sw,sh);ctx.clearRect(0,0,CW,CH);ctx.fillStyle=bgColor||'#0e0e12';ctx.fillRect(0,0,CW,CH);ctx.putImageData(id,0,0);clearSel();saveFrame();updateTimeline();};
function clearSel(){selActive=false;selX=selY=selW=selH=0;sctx.clearRect(0,0,CW,CH);}
function drawSelRect(){sctx.clearRect(0,0,CW,CH);if(!selActive||selW===0)return;const sx=Math.min(selX,selX+selW),sy=Math.min(selY,selY+selH),sw=Math.abs(selW),sh=Math.abs(selH);sctx.save();sctx.strokeStyle='#fff';sctx.lineWidth=1;sctx.setLineDash([]);sctx.strokeRect(sx,sy,sw,sh);sctx.strokeStyle='#000';sctx.lineWidth=1;sctx.setLineDash([4,4]);sctx.lineDashOffset=selDash;sctx.strokeRect(sx,sy,sw,sh);sctx.restore();}
function animSel(){selDash=(selDash+.3)%8;if(selActive)drawSelRect();requestAnimationFrame(animSel);}animSel();
function pushUndo(){undoStack.push(ctx.getImageData(0,0,CW,CH));if(undoStack.length>30)undoStack.shift();redoStack=[];}
document.getElementById('btn-undo').onclick=()=>{if(undoStack.length){redoStack.push(ctx.getImageData(0,0,CW,CH));ctx.putImageData(undoStack.pop(),0,0);saveFrame();updateTimeline();}};
document.getElementById('btn-redo').onclick=()=>{if(redoStack.length){undoStack.push(ctx.getImageData(0,0,CW,CH));ctx.putImageData(redoStack.pop(),0,0);saveFrame();updateTimeline();}};
document.getElementById('btn-clear').onclick=()=>{pushUndo();fillBackground();saveFrame();updateTimeline();};
function getPos(e){const r=mainCanvas.getBoundingClientRect();const sx=CW/r.width,sy=CH/r.height;const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;return[(cx-r.left)*sx,(cy-r.top)*sy];}
function hsl2hex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(-1,Math.min(k-3,9-k,1));return Math.round(255*c).toString(16).padStart(2,'0');};return'#'+f(0)+f(8)+f(4);}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}
function getDrawColor(){if(effect==='rainbow'){rainbowHue=(rainbowHue+4)%360;return`hsl(${rainbowHue},100%,55%)`;}if(effect==='pastel'){rainbowHue=(rainbowHue+2)%360;return hsl2hex(rainbowHue,65,80);}if(effect==='bw')return Math.random()>.5?'#111':'#333';return currentColor;}
function mirroredPairs(x,y,px,py){const mx=CW-x,my=CH-y,mpx=CW-px,mpy=CH-py;if(symmetry==='h')return[[x,y,px,py],[mx,y,mpx,py]];if(symmetry==='v')return[[x,y,px,py],[x,my,px,mpy]];if(symmetry==='4')return[[x,y,px,py],[mx,y,mpx,py],[x,my,px,mpy],[mx,my,mpx,mpy]];if(symmetry==='8')return[[x,y,px,py],[mx,y,mpx,py],[x,my,px,mpy],[mx,my,mpx,mpy],[y,x,py,px],[my,x,mpy,px],[y,mx,py,mpx],[my,mx,mpy,mpx]];if(symmetry==='rad'){const cx2=CW/2,cy2=CH/2,pts=[];const dx=x-cx2,dy=y-cy2,dpx=px-cx2,dpy=py-cy2;const r1=Math.sqrt(dx*dx+dy*dy),a0=Math.atan2(dy,dx),r2=Math.sqrt(dpx*dpx+dpy*dpy),a1=Math.atan2(dpy,dpx);for(let i=0;i<6;i++){const a=i*Math.PI/3;pts.push([cx2+r1*Math.cos(a0+a),cy2+r1*Math.sin(a0+a),cx2+r2*Math.cos(a1+a),cy2+r2*Math.sin(a1+a)]);}return pts;}return[[x,y,px,py]];}
function drawBrush(x,y,px,py,color){
  const sz=getSize(),op=getOpacity();const angle=Math.atan2(y-py,x-px);const dist=Math.hypot(x-px,y-py)||1;
  ctx.save();ctx.globalAlpha=op;
  if(tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=sz*2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();ctx.restore();return;}

  const br=specialBrush;

  if(br==='watercolor'){const rgb=hexToRgb(color);for(let i=0;i<6;i++){const ox=(Math.random()-.5)*sz*1.8,oy=(Math.random()-.5)*sz*1.8,r2=sz*(.6+Math.random()*.8);ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${op*.07})`;ctx.beginPath();ctx.ellipse(x+ox,y+oy,r2,r2*(.5+Math.random()*.5),Math.random()*Math.PI,0,Math.PI*2);ctx.fill();}ctx.restore();return;}
  if(br==='oil'){const rgb=hexToRgb(color);ctx.strokeStyle=color;ctx.lineWidth=sz;ctx.lineCap='round';ctx.globalAlpha=op*.9;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();for(let i=0;i<4;i++){const li=Math.floor((Math.random()-.5)*40);ctx.strokeStyle=`rgb(${Math.min(255,rgb.r+li)},${Math.min(255,rgb.g+li)},${Math.min(255,rgb.b+li)})`;ctx.lineWidth=sz*(.2+Math.random()*.4);ctx.globalAlpha=op*(.3+Math.random()*.4);const ox=(Math.random()-.5)*sz*.8,oy=(Math.random()-.5)*sz*.8;ctx.beginPath();ctx.moveTo(px+ox,py+oy);ctx.lineTo(x+ox,y+oy);ctx.stroke();}ctx.restore();return;}

  if(br==='chalk'){ctx.strokeStyle=color;ctx.lineCap='round';for(let i=0;i<4;i++){ctx.lineWidth=sz;ctx.globalAlpha=op*(.08+Math.random()*.2);const ox=(Math.random()-.5)*sz*.5,oy=(Math.random()-.5)*sz*.5;ctx.beginPath();ctx.moveTo(px+ox,py+oy);ctx.lineTo(x+ox,y+oy);ctx.stroke();}ctx.globalAlpha=op*.55;ctx.lineWidth=sz*.25;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();ctx.restore();return;}

  if(br==='hair-fine'){const n=Math.max(2,Math.floor(sz/3));for(let i=0;i<n;i++){const sp=(i/n-.5)*sz,ox=Math.cos(angle+Math.PI/2)*sp,oy=Math.sin(angle+Math.PI/2)*sp;ctx.strokeStyle=color;ctx.lineWidth=.4+Math.random()*.3;ctx.globalAlpha=op*(.6+Math.random()*.4);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px+ox,py+oy);ctx.lineTo(x+ox,y+oy);ctx.stroke();}ctx.restore();return;}
  if(br==='hair-wavy'){const n=Math.max(2,Math.floor(sz/2));for(let i=0;i<n;i++){const sp=(i/n-.5)*sz*1.2,ox=Math.cos(angle+Math.PI/2)*sp,oy=Math.sin(angle+Math.PI/2)*sp,wv=Math.sin(strokeCount*.25+i)*sz*.5,wx=Math.cos(angle+Math.PI/2)*wv,wy=Math.sin(angle+Math.PI/2)*wv;ctx.strokeStyle=color;ctx.lineWidth=.7+Math.random()*.5;ctx.globalAlpha=op*(.5+Math.random()*.5);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px+ox,py+oy);ctx.quadraticCurveTo((px+x)/2+ox+wx,(py+y)/2+oy+wy,x+ox,y+oy);ctx.stroke();}ctx.restore();return;}
  if(br==='hair-curly'){const n=Math.max(2,Math.floor(sz/2));for(let i=0;i<n;i++){const sp=(i/n-.5)*sz*1.4,ox=Math.cos(angle+Math.PI/2)*sp,oy=Math.sin(angle+Math.PI/2)*sp,curl=Math.sin(strokeCount*.4+i*1.5)*sz*.8,cx2=Math.cos(angle+Math.PI/2)*curl,cy2=Math.sin(angle+Math.PI/2)*curl;ctx.strokeStyle=color;ctx.lineWidth=.8+Math.random()*.5;ctx.globalAlpha=op*(.5+Math.random()*.4);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px+ox,py+oy);ctx.bezierCurveTo((px+x)/3+ox+cx2,(py+y)/3+oy+cy2,(px+x)*2/3+ox-cx2,(py+y)*2/3+oy-cy2,x+ox,y+oy);ctx.stroke();}ctx.restore();return;}
  if(br==='hair-coily'){const n=Math.max(3,Math.floor(sz*.8));for(let i=0;i<n;i++){const sp=(i/n-.5)*sz*1.6,ox=Math.cos(angle+Math.PI/2)*sp,oy=Math.sin(angle+Math.PI/2)*sp,coil=Math.sin(strokeCount*.6+i*2)*sz,c2x=Math.cos(angle)*coil,c2y=Math.sin(angle)*coil;ctx.strokeStyle=color;ctx.lineWidth=1+Math.random()*.6;ctx.globalAlpha=op*(.5+Math.random()*.4);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px+ox,py+oy);ctx.bezierCurveTo(px+ox+c2x,py+oy+c2y,x+ox-c2x,y+oy-c2y,x+ox,y+oy);ctx.stroke();}ctx.restore();return;}

  if(br==='lash'){const cnt=Math.max(3,Math.floor(sz*1.2));for(let i=0;i<cnt;i++){const t=i/cnt,sp=(t-.5)*sz*2.5,ox=Math.cos(angle+Math.PI/2)*sp,oy=Math.sin(angle+Math.PI/2)*sp,len=sz*(.7+Math.sin(t*Math.PI)*.8),curl=sz*(.3+t*.5),ex=x+ox+Math.cos(angle-Math.PI/3)*len,ey=y+oy+Math.sin(angle-Math.PI/3)*len-curl;ctx.strokeStyle=color;ctx.lineWidth=1.2*(1-t*.4);ctx.globalAlpha=op*(.7+t*.3);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+ox,y+oy);ctx.quadraticCurveTo(x+ox+Math.cos(angle-Math.PI/4)*len*.5,y+oy+Math.sin(angle-Math.PI/4)*len*.5-curl*.5,ex,ey);ctx.stroke();}ctx.restore();return;}
  if(br==='eye'){const rgb=hexToRgb(color);ctx.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${op*.9})`;ctx.lineWidth=sz;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();ctx.strokeStyle=`rgba(255,255,255,${op*.7})`;ctx.lineWidth=sz*.38;ctx.beginPath();ctx.moveTo(px-sz*.15,py-sz*.15);ctx.lineTo(x-sz*.15,y-sz*.15);ctx.stroke();ctx.restore();return;}
  if(br==='fur'){const cnt=Math.max(3,sz);for(let i=0;i<cnt;i++){const sp=(Math.random()-.5)*sz*2,ox=Math.cos(angle+Math.PI/2)*sp,oy=Math.sin(angle+Math.PI/2)*sp,fl=sz*(.5+Math.random()*.8);ctx.strokeStyle=color;ctx.lineWidth=.5+Math.random()*.8;ctx.globalAlpha=op*(.3+Math.random()*.6);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+ox,y+oy);ctx.lineTo(x+ox+Math.cos(angle)*fl,y+oy+Math.sin(angle)*fl);ctx.stroke();}ctx.restore();return;}

  if(br==='fire'){for(let i=0;i<Math.max(3,sz);i++){const ox=(Math.random()-.5)*sz*1.5,h=sz*(1+Math.random()*1.5),hue=Math.random()>.5?15:35;ctx.fillStyle=`hsl(${hue},100%,${50+Math.random()*30}%)`;ctx.globalAlpha=op*(.4+Math.random()*.5);ctx.beginPath();ctx.moveTo(x+ox,y);ctx.quadraticCurveTo(x+ox+(Math.random()-.5)*sz*.8,y-h*.5,x+ox+(Math.random()-.5)*sz*.4,y-h);ctx.lineTo(x+ox,y);ctx.fill();}ctx.restore();return;}
  if(br==='snow'){for(let i=0;i<Math.max(3,sz);i++){const ox=(Math.random()-.5)*sz*3,oy=(Math.random()-.5)*sz*3;ctx.fillStyle='#fff';ctx.globalAlpha=op*(.5+Math.random()*.5);ctx.beginPath();ctx.arc(x+ox,y+oy,Math.random()*sz*.35+.5,0,Math.PI*2);ctx.fill();}ctx.restore();return;}
  if(br==='bubble'){if(Math.random()>.55){const r=sz*(.4+Math.random()*.7),ox=(Math.random()-.5)*sz*2,oy=(Math.random()-.5)*sz*2;const rgb=hexToRgb(color);ctx.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${op*.7})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(x+ox,y+oy,r,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.12)';ctx.fill();ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(x+ox-r*.3,y+oy-r*.3,r*.2,0,Math.PI*2);ctx.fill();}ctx.restore();return;}
  if(br==='leaf'){if(Math.random()>.4){const la=angle+(-0.5+Math.random())*1.5,ll=sz*(.6+Math.random()*.8),lx=x+(Math.random()-.5)*sz*1.5,ly=y+(Math.random()-.5)*sz*1.5;const rgb=hexToRgb(color);ctx.fillStyle=`rgba(${rgb.r},${Math.min(255,rgb.g+30)},${rgb.b},${op*.8})`;ctx.beginPath();ctx.moveTo(lx,ly);ctx.quadraticCurveTo(lx+Math.cos(la+.5)*ll*.7,ly+Math.sin(la+.5)*ll*.7,lx+Math.cos(la)*ll,ly+Math.sin(la)*ll);ctx.quadraticCurveTo(lx+Math.cos(la-.5)*ll*.7,ly+Math.sin(la-.5)*ll*.7,lx,ly);ctx.fill();}ctx.restore();return;}

function startDraw(e){const[x,y]=getPos(e);startX=x;startY=y;lastX=x;lastY=y;drawing=true;if(tool==='eyedrop'){const px2=ctx.getImageData(Math.round(x),Math.round(y),1,1).data;setColor('#'+[px2[0],px2[1],px2[2]].map(v=>v.toString(16).padStart(2,'0')).join(''));drawing=false;return;}if(tool==='text'){drawing=false;const txt=prompt('Enter text:');if(!txt)return;pushUndo();ctx.save();ctx.fillStyle=currentColor;ctx.font=`${getSize()*3}px sans-serif`;ctx.globalAlpha=getOpacity();ctx.fillText(txt,x,y);ctx.restore();saveFrame();updateTimeline();return;}if(tool==='select'){selX=x;selY=y;selW=0;selH=0;selActive=true;return;}if(tool==='grad'){gradStart=[x,y];return;}if(tool==='move'){moveStartX=x;moveStartY=y;moveSnapshot=ctx.getImageData(0,0,CW,CH);pushUndo();return;}if(tool==='fill'){pushUndo();floodFill(Math.round(x),Math.round(y),getDrawColor());drawing=false;saveFrame();updateTimeline();return;}pushUndo();snapshotBefore=ctx.getImageData(0,0,CW,CH);}
function moveDraw(e){if(!drawing)return;const[x,y]=getPos(e);if(tool==='select'){selW=x-selX;selH=y-selY;drawSelRect();return;}if(tool==='move'&&moveSnapshot){const dx=Math.round(x-moveStartX),dy=Math.round(y-moveStartY);ctx.clearRect(0,0,CW,CH);ctx.fillStyle=bgColor||'#0e0e12';ctx.fillRect(0,0,CW,CH);ctx.putImageData(moveSnapshot,dx,dy);return;}if(['pen','brush','smudge','eraser'].includes(tool)||!['line','rect','rectfill','circle','circlefill'].includes(tool)){const color=getDrawColor();mirroredPairs(x,y,lastX,lastY).forEach(([cx,cy,cpx,cpy])=>drawBrush(cx,cy,cpx,cpy,color));if(effect==='sparkle'&&Math.random()>.72){sparkles.push({x,y,life:1,color:getDrawColor()});animSparkles();}}else{ctx.putImageData(snapshotBefore,0,0);ctx.save();ctx.strokeStyle=getDrawColor();ctx.lineWidth=getSize();ctx.globalAlpha=getOpacity();ctx.lineCap='round';if(tool==='line'){ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();}else if(tool==='rect'){ctx.strokeRect(startX,startY,x-startX,y-startY);}else if(tool==='rectfill'){ctx.fillStyle=getDrawColor();ctx.fillRect(startX,startY,x-startX,y-startY);}else if(tool==='circle'){const rx=(x-startX)/2,ry=(y-startY)/2;ctx.beginPath();ctx.ellipse(startX+rx,startY+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.stroke();}else if(tool==='circlefill'){const rx=(x-startX)/2,ry=(y-startY)/2;ctx.fillStyle=getDrawColor();ctx.beginPath();ctx.ellipse(startX+rx,startY+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.fill();}ctx.restore();}[lastX,lastY]=[x,y];}
function endDraw(e){if(!drawing)return;drawing=false;webLastX=null;webLastY=null;if(tool==='grad'&&gradStart){const[x,y]=getPos(e);pushUndo();const grad=ctx.createLinearGradient(gradStart[0],gradStart[1],x,y);grad.addColorStop(0,currentColor);const rgb=hexToRgb(currentColor);grad.addColorStop(1,`rgba(${rgb.r},${rgb.g},${rgb.b},0)`);ctx.save();ctx.globalAlpha=getOpacity();ctx.fillStyle=grad;ctx.fillRect(0,0,CW,CH);ctx.restore();gradStart=null;}saveFrame();updateTimeline();autoSave();}
function animSparkles(){sparkles=sparkles.filter(s=>s.life>0);sparkles.forEach(s=>{ctx.save();ctx.globalAlpha=s.life*.8;ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,2*s.life,0,Math.PI*2);ctx.fill();ctx.restore();s.life-=.1;s.x+=(Math.random()-.5)*2;s.y-=1;});if(sparkles.length)requestAnimationFrame(animSparkles);}
function floodFill(sx,sy,fillColor){const imgData=ctx.getImageData(0,0,CW,CH);const data=imgData.data,w=CW,h=CH;const idx=(sy*w+sx)*4;const tr=data[idx],tg=data[idx+1],tb=data[idx+2];const fr=parseInt(fillColor.slice(1,3),16),fg=parseInt(fillColor.slice(3,5),16),fb=parseInt(fillColor.slice(5,7),16);if(tr===fr&&tg===fg&&tb===fb)return;const stack=[[sx,sy]],visited=new Uint8Array(w*h);while(stack.length){const[cx,cy]=stack.pop();if(cx<0||cx>=w||cy<0||cy>=h)continue;const i=cy*w+cx;if(visited[i])continue;visited[i]=1;const pi=i*4;if(Math.abs(data[pi]-tr)>30||Math.abs(data[pi+1]-tg)>30||Math.abs(data[pi+2]-tb)>30)continue;data[pi]=fr;data[pi+1]=fg;data[pi+2]=fb;data[pi+3]=255;stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);}ctx.putImageData(imgData,0,0);}

const beatRows=[{name:'Kick',fn:synthKick,color:'#ff3366'},{name:'Snare',fn:synthSnare,color:'#ff7700'},{name:'Hi-hat',fn:()=>synthHat(false),color:'#ffcc00'},{name:'Open hat',fn:()=>synthHat(true),color:'#00cc66'},{name:'Clap',fn:synthClap,color:'#38bdf8'},{name:'Bass',fn:synthBass,color:'#c084fc'}];
const beatState=beatRows.map(()=>Array(32).fill(false));
function buildBeatGrid(){const grid=document.getElementById('beat-grid');grid.innerHTML='';beatRows.forEach((row,ri)=>{const rowEl=document.createElement('div');rowEl.className='beat-row';const lbl=document.createElement('div');lbl.className='beat-label';lbl.textContent=row.name;lbl.style.color=row.color;rowEl.appendChild(lbl);for(let s=0;s<beatSteps;s++){const cell=document.createElement('div');cell.className='beat-cell'+(beatState[ri][s]?' on':'');cell.id=`bc-${ri}-${s}`;if(s===beatStep)cell.classList.add('playing');cell.onclick=()=>{beatState[ri][s]=!beatState[ri][s];cell.classList.toggle('on',beatState[ri][s]);};if(s%4===3)cell.style.marginRight='4px';rowEl.appendChild(cell);}grid.appendChild(rowEl);});}
buildBeatGrid();
document.getElementById('bpm-sl').oninput=function(){document.getElementById('bpm-v').textContent=this.value;if(beatInterval){stopBeat();startBeat();}};
['8','16','32'].forEach(n=>{document.getElementById('steps-'+n).onclick=()=>{beatSteps=+n;['8','16','32'].forEach(x=>document.getElementById('steps-'+x).classList.remove('active'));document.getElementById('steps-'+n).classList.add('active');buildBeatGrid();};});
document.getElementById('beat-clear').onclick=()=>{beatState.forEach(r=>r.fill(false));buildBeatGrid();};
function startBeat(){const bpm=+document.getElementById('bpm-sl').value;const interval=60000/bpm/4;beatInterval=setInterval(()=>{document.querySelectorAll('.beat-cell').forEach(c=>c.classList.remove('playing'));beatRows.forEach((row,ri)=>{const cell=document.getElementById(`bc-${ri}-${beatStep}`);if(cell)cell.classList.add('playing');if(beatState[ri][beatStep])row.fn();});beatStep=(beatStep+1)%beatSteps;},interval);}
function stopBeat(){clearInterval(beatInterval);beatInterval=null;beatStep=0;document.querySelectorAll('.beat-cell').forEach(c=>c.classList.remove('playing'));}
document.getElementById('beat-play').onclick=()=>{if(!beatInterval)startBeat();};
document.getElementById('beat-stop').onclick=stopBeat;
let uploadedAudio=null,uploadLooping=false;
document.getElementById('btn-upload-audio').onclick=()=>document.getElementById('audio-file-input').click();
document.getElementById('audio-file-input').onchange=function(){const f=this.files[0];if(!f)return;const url=URL.createObjectURL(f);if(uploadedAudio){uploadedAudio.pause();uploadedAudio.src='';}uploadedAudio=new Audio(url);uploadedAudio.volume=+document.getElementById('upload-vol').value/100;document.getElementById('uploaded-track').textContent=f.name;['btn-play-upload','btn-stop-upload','btn-loop-upload','upload-vol'].forEach(id=>{document.getElementById(id).style.display='';});document.getElementById('audio-status').textContent='Ready';drawWaveform(f);this.value='';};
document.getElementById('btn-play-upload').onclick=()=>{if(uploadedAudio){uploadedAudio.currentTime=0;uploadedAudio.play();}};
document.getElementById('btn-stop-upload').onclick=()=>{if(uploadedAudio){uploadedAudio.pause();uploadedAudio.currentTime=0;}};
document.getElementById('btn-loop-upload').onclick=function(){if(!uploadedAudio)return;uploadLooping=!uploadLooping;uploadedAudio.loop=uploadLooping;this.textContent='Loop: '+(uploadLooping?'On':'Off');this.classList.toggle('active',uploadLooping);};
document.getElementById('upload-vol').oninput=function(){if(uploadedAudio)uploadedAudio.volume=this.value/100;};
async function drawWaveform(file){try{const ac=getAudioCtx();const ab=await file.arrayBuffer();const buf=await ac.decodeAudioData(ab);const data=buf.getChannelData(0);const wc=document.getElementById('waveform');wc.width=800;wc.height=36;const wctx=wc.getContext('2d');wctx.fillStyle='#1e1e26';wctx.fillRect(0,0,800,36);const step=Math.ceil(data.length/800);wctx.strokeStyle='#38bdf8';wctx.lineWidth=1;wctx.beginPath();for(let i=0;i<800;i++){const v=data[i*step]||0;const y=18+v*16;i===0?wctx.moveTo(i,y):wctx.lineTo(i,y);}wctx.stroke();}catch(e){}}
let mediaRecorder=null,recChunks=[],recBlob=null,recAudio=null,recLooping=false;
document.getElementById('btn-rec-start').onclick=async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(stream);recChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};mediaRecorder.onstop=()=>{recBlob=new Blob(recChunks,{type:'audio/webm'});const url=URL.createObjectURL(recBlob);if(recAudio){recAudio.pause();recAudio.src='';}recAudio=new Audio(url);recAudio.volume=+document.getElementById('rec-vol').value/100;document.getElementById('rec-status').textContent='Saved!';['btn-rec-play','btn-rec-loop','btn-rec-clear'].forEach(id=>{document.getElementById(id).style.display='';});drawRecWaveform(recBlob);};mediaRecorder.start();document.getElementById('rec-status').textContent='Recording...';document.getElementById('btn-rec-start').style.display='none';document.getElementById('btn-rec-stop').style.display='';startRecViz(stream);}catch(e){document.getElementById('rec-status').textContent='Mic denied. Allow mic in browser settings.';}};
document.getElementById('btn-rec-stop').onclick=()=>{if(mediaRecorder&&mediaRecorder.state!=='inactive'){mediaRecorder.stop();mediaRecorder.stream.getTracks().forEach(t=>t.stop());}document.getElementById('btn-rec-start').style.display='';document.getElementById('btn-rec-stop').style.display='none';};
document.getElementById('btn-rec-play').onclick=()=>{if(recAudio){recAudio.currentTime=0;recAudio.play();}};
document.getElementById('btn-rec-loop').onclick=function(){if(!recAudio)return;recLooping=!recLooping;recAudio.loop=recLooping;this.textContent='Loop: '+(recLooping?'On':'Off');this.classList.toggle('active',recLooping);};
document.getElementById('btn-rec-clear').onclick=()=>{if(recAudio){recAudio.pause();recAudio.src='';}recAudio=null;recBlob=null;document.getElementById('rec-status').textContent='Click Record to start';['btn-rec-play','btn-rec-loop','btn-rec-clear'].forEach(id=>{document.getElementById(id).style.display='none';});document.getElementById('rec-waveform').getContext('2d').clearRect(0,0,800,36);};
document.getElementById('rec-vol').oninput=function(){if(recAudio)recAudio.volume=this.value/100;};
let recVizAnim=null;
function startRecViz(stream){const ac=getAudioCtx();const src=ac.createMediaStreamSource(stream);const analyser=ac.createAnalyser();analyser.fftSize=256;src.connect(analyser);const data=new Uint8Array(analyser.frequencyBinCount);const wc=document.getElementById('rec-waveform');const wctx=wc.getContext('2d');function draw(){recVizAnim=requestAnimationFrame(draw);analyser.getByteTimeDomainData(data);wctx.fillStyle='#1e1e26';wctx.fillRect(0,0,800,36);wctx.strokeStyle='#f472b6';wctx.lineWidth=1.5;wctx.beginPath();const slice=800/data.length;for(let i=0;i<data.length;i++){const v=data[i]/128,y=v*18;i===0?wctx.moveTo(i*slice,y):wctx.lineTo(i*slice,y);}wctx.stroke();}draw();if(mediaRecorder)mediaRecorder.addEventListener('stop',()=>{cancelAnimationFrame(recVizAnim);},{once:true});}
async function drawRecWaveform(blob){try{const ac=getAudioCtx();const ab=await blob.arrayBuffer();const buf=await ac.decodeAudioData(ab);const data=buf.getChannelData(0);const wc=document.getElementById('rec-waveform');const wctx=wc.getContext('2d');wctx.fillStyle='#1e1e26';wctx.fillRect(0,0,800,36);const step=Math.ceil(data.length/800);wctx.strokeStyle='#f472b6';wctx.lineWidth=1;wctx.beginPath();for(let i=0;i<800;i++){const v=data[i*step]||0;const y=18+v*16;i===0?wctx.moveTo(i,y):wctx.lineTo(i,y);}wctx.stroke();}catch(e){}}
// INIT
bgColor='#0e0e12';
if(!loadSaved()){fillBackground();saveFrame();updateTimeline();}
</script>
</body>
</html>
